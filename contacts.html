            <div class="logo">
                <h1>Let`s Connect!!</h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About Me</a>
                <a href="contact.html">Contact</a>
            </div>

<section class="contact-section">
    

    <h1>Contact Me</h1>
    <p class="contact-intro">
        Interested in working with me? Let’s connect. Fill out the form or reach me through my social platforms below.
    </p>

    <div class="contact-container">

        <div class="contact-info">
            <h2>Connect With Me</h2>
            <li>
    <a href="#">
        <i class="fab fa-github"></i> GitHub
    </a>
</li>

<li>
    <a href="#">
        <i class="fab fa-linkedin"></i> LinkedIn
    </a>
</li>

<li>
    <a href="#">
        <i class="fab fa-instagram"></i> Instagram
    </a>
</li>

<li>
    <a href="mailto:your@email.com">
        <i class="fas fa-envelope"></i> Email
    </a>
</li>
        </div>

        <div class="contact-form">
            <h2>Request My Services</h2>

            <form action="#" method="POST">
                <input type="text" name="fullname" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="text" name="subject" placeholder="Service Needed" required>
                <textarea name="message" rows="6" placeholder="Describe your project..." required></textarea>
                <button type="submit">Request Service</button>
            </form>
        </div>

    </div>

</section>

</body>
</html>
